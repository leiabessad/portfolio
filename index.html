<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio - Bureau</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="desktop">
        <img src="photo/fondecran.png" id="background" alt="Fond d'écran">

        <div class="icon" data-project="project1">
            <img src="photo/vignette.png" alt="Icon 1">
            <div class="hover-image">
                <img src="photo/miniature-project1.png" alt="Hover Icon 1">
            </div>
            <p>Mon projet 1</p>
        </div>


        <div class="icon" data-project="project1">
            <img src="photo/vignette.png" alt="Vignette 1">
            <div class="hover-image">
                <img src="photo/miniature-project1.png" alt="Miniature de projet">
            </div>
            <p>Easy Love Story</p>
        </div>

        <div class="icon" data-project="project2">
            <img src="photo/vignette.png" alt="Vignette 2">
            <div class="hover-image">
                <img src="photo/miniature-project2.jpg" alt="Miniature de projet">
            </div>
            <p>Ain't Your "Mayo"</p>
        </div>

        <div class="icon" data-project="project3">
            <img src="photo/vignette.png" alt="Vignette 3">
            <div class="hover-image">
                <img src="photo/miniature-project3.jpg" alt="Miniature de projet">
            </div>
            <p>Steinkrebse</p>
        </div>

        <div class="icon" data-project="Project">
            <img src="photo/corbeille.png" alt="Corbeille">
            <p>Corbeille</p>
        </div>


        <div class="Invariant" id="Invariant">
            <img src="photo/contact.png" alt="Contact">
            <p>Contactez-moi</p>
        </div>
        
        <!-- Fenêtre modale (apparaît quand on double-clique sur une vignette) -->
        <div id="modal" class="hidden">
            <div class="modal-content">
                <span id="close">&times;</span>
                <div id="modal-images">
                    <!-- Les images du projet vont ici -->
                </div>
                <div id="modal-description">
                    <!-- Texte du projet ici -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
