<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio - Bureau</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="desktop">
        <img src="fondecran.jpg" id="background" alt="Fond d'écran">

        <div class="icon" id="icon1" data-project="projet1">
            <img src="vignette1.png" alt="Vignette 1">
            <p>Projet 1</p>
        </div>

        <div class="icon" id="icon2" data-project="projet2">
            <img src="vignette2.png" alt="Vignette 2">
            <p>Projet 2</p>
        </div>

        <div class="icon" id="icon3" data-project="projet3">
            <img src="vignette3.png" alt="Vignette 3">
            <p>Projet 3</p>
        </div>

        <!-- Fenêtre modale (apparaît quand on double-clique sur une vignette) -->
        <div id="modal" class="hidden">
            <div class="modal-content">
                <span id="close">&times;</span>
                <div id="modal-images">
                    <!-- Les images du projet vont ici -->
                </div>
                <div id="modal-description">
                    <!-- Texte du projet ici -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
